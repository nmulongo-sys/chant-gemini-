<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chant & Justesse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f9; --text-color: #333; --primary-color: #4a90e2; 
            --secondary-color: #e24a4a; --border-color: #ddd;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; }
        nav { display: flex; background-color: #fff; border-bottom: 1px solid var(--border-color); overflow-x: auto; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 15px 10px; background: none; border: none; border-bottom: 3px solid transparent; font-size: 1rem; font-weight: bold; color: #666; cursor: pointer; white-space: nowrap; transition: all 0.3s ease; }
        .tab-btn.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        .view { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .view.active { display: flex; flex-direction: column; }
        .control-group { margin-bottom: 15px; }
        textarea#abc-input { width: 100%; height: 120px; padding: 10px; font-family: monospace; border: 1px solid var(--border-color); border-radius: 5px; resize: vertical; margin-bottom: 10px; }
        #paper { background-color: #fff; border: 1px solid var(--border-color); border-radius: 5px; padding: 10px; overflow-x: auto; overflow-y: auto; min-height: 150px; }
        h2 { margin-bottom: 15px; font-size: 1.5rem; }
        .engine-panel { background: #eef2f7; border: 1px solid #cdd6e0; border-radius: 5px; padding: 10px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; font-size: 0.9rem; }
        .btn-small { padding: 4px 8px; border: 1px solid #ccc; background: #fff; border-radius: 3px; cursor: pointer; }
        .btn-small:active { background: #eee; }
        .btn-mic { padding: 8px 12px; border: none; background: var(--primary-color); color: white; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .btn-mic.listening { background: var(--secondary-color); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        /* Styles Liste Studio */
        .studio-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #eee; }
        .studio-item:last-child { border-bottom: none; }
        .status-badge { font-size: 0.8rem; padding: 4px 8px; border-radius: 12px; background: #eee; color: #666; font-weight: bold; }
        .status-badge.ok { background: #d4edda; color: #155724; }
        .status-badge.warn { background: #fff3cd; color: #856404; }
        
        /* Boutons d'action Studio */
        .btn-action { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-rec { background: var(--secondary-color); }
        .btn-rec.active { background: #333; animation: pulse 1s infinite; }
        .btn-play-sample { background: var(--primary-color); margin-left: 5px; }
    </style>
</head>
<body>

    <nav>
        <button class="tab-btn" onclick="switchTab('partition')">Partition</button>
        <button class="tab-btn" onclick="switchTab('ecoute')">Écoute</button>
        <button class="tab-btn" onclick="switchTab('chant')">Chant</button>
        <button class="tab-btn active" onclick="switchTab('studio')">Studio</button>
        <button class="tab-btn" onclick="switchTab('bibliotheque')">Biblio</button>
    </nav>

    <!-- Reste de l'UI masquée -->
    <div id="view-partition" class="view"><h2>Éditeur</h2></div>
    <div id="view-ecoute" class="view"><h2>Écoute</h2></div>
    <div id="view-chant" class="view"><h2>Chant</h2></div>
    <div id="view-bibliotheque" class="view"><h2>Biblio</h2></div>

    <!-- VUE STUDIO (Active) -->
    <div id="view-studio" class="view active">
        <h2>Studio Personnel</h2>
        
        <div class="control-group" style="background: #fff; padding: 15px; border-radius: 5px; border: 1px solid var(--border-color); margin-bottom: 20px;">
            <h3>1. Ma Tessiture</h3>
            <div style="display: flex; gap: 20px; align-items: flex-end; margin-top: 15px;">
                <div><label>Min</label><select id="note-min" style="padding: 8px; width: 120px;"></select></div>
                <div><label>Max</label><select id="note-max" style="padding: 8px; width: 120px;"></select></div>
            </div>
            <p id="tessiture-summary" style="font-weight: bold; color: var(--primary-color); margin-top: 10px;"></p>
        </div>

        <div class="control-group" style="background: #fff; padding: 15px; border-radius: 5px; border: 1px solid var(--border-color);">
            <h3>2. Enregistrement (<span id="db-status" style="font-size:0.9rem; color:#666;">Connexion DB...</span>)</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">
                Cliquez sur REC. Écoutez la note de référence, puis chantez-la de manière continue.
            </p>
            <div id="studio-recording-list" style="border: 1px solid #eee; border-radius: 5px; max-height: 450px; overflow-y: auto;">
                <!-- Liste générée par JS -->
            </div>
        </div>
    </div>

    <script>
        // --- Navigation ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById('view-' + tabId).classList.add('active');
        }

        // --- Utilitaires Audio / MIDI ---
        const noteNames = ["Do", "Do#", "Ré", "Ré#", "Mi", "Fa", "Fa#", "Sol", "Sol#", "La", "La#", "Si"];
        function midiToNoteName(midiNumber) { return `${noteNames[midiNumber % 12]}${Math.floor(midiNumber / 12) - 1}`; }
        function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }
        
        let audioCtx = null;

        // --- Synthèse de référence ---
        function playReferencePitch(midiPitch) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const freq = midiToFreq(midiPitch);
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.0); // Bip d'une seconde
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.1);
        }

        // --- Algorithme YIN ---
        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length; let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1;
            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
            buf = buf.slice(r1, r2); SIZE = buf.length;
            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE - i; j++) c[i] = c[i] + buf[j] * buf[j + i];
            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            return sampleRate / maxpos;
        }

        // ==========================================
        // BASE DE DONNÉES (IndexedDB)
        // ==========================================
        let db;
        const dbName = "ChantJustesseDB";
        const storeName = "samples";

        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(storeName)) {
                        database.createObjectStore(storeName, { keyPath: "midi" });
                    }
                };
                request.onsuccess = (event) => {
                    db = event.target.result;
                    document.getElementById('db-status').textContent = "DB Prête";
                    document.getElementById('db-status').style.color = "green";
                    resolve(db);
                };
                request.onerror = (event) => reject(event.target.error);
            });
        }

        function checkExistingSamples() {
            return new Promise((resolve) => {
                if(!db) return resolve({});
                const tx = db.transaction([storeName], "readonly");
                const store = tx.objectStore(storeName);
                const req = store.getAll();
                req.onsuccess = () => {
                    const statusMap = {};
                    req.result.forEach(row => { statusMap[row.midi] = row; });
                    resolve(statusMap);
                };
            });
        }

        function saveSampleToDB(midi, blob, mime, centsOffset) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([storeName], "readwrite");
                const store = tx.objectStore(storeName);
                const data = {
                    midi: midi,
                    blob: blob,
                    mime: mime,
                    cents_offset: centsOffset,
                    date: new Date().getTime()
                };
                const req = store.put(data);
                req.onsuccess = () => resolve();
                req.onerror = () => reject();
            });
        }

        function playSampleFromDB(midi) {
            const tx = db.transaction([storeName], "readonly");
            const store = tx.objectStore(storeName);
            const req = store.get(midi);
            req.onsuccess = () => {
                if(req.result && req.result.blob) {
                    const url = URL.createObjectURL(req.result.blob);
                    const audio = new Audio(url);
                    audio.play();
                } else {
                    alert("Échantillon introuvable !");
                }
            };
        }

        // ==========================================
        // MOTEUR D'ENREGISTREMENT & VALIDATION YIN
        // ==========================================
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let activeRecordMidi = null;
        
        let analyserNode = null;
        let yinInterval = null;
        let recordedCents = [];

        async function toggleRecord(midi) {
            const btn = document.getElementById(`btn-rec-${midi}`);
            
            // Si on clique pour ARRETER
            if (isRecording && activeRecordMidi === midi) {
                stopRecording(midi, btn);
                return;
            }

            // Si un autre enregistrement tourne, on bloque
            if (isRecording) { alert("Arrêtez l'enregistrement en cours."); return; }

            // 1. DÉMARRAGE DE L'ENREGISTREMENT
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                
                // Joue la référence
                playReferencePitch(midi);
                
                // Demande l'accès micro
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false }});
                
                // Préparation YIN
                analyserNode = audioCtx.createAnalyser();
                analyserNode.fftSize = 2048;
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyserNode);

                // Setup MediaRecorder
                let mimeType = 'audio/webm;codecs=opus';
                if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'audio/mp4'; // Fallback iOS/Safari
                
                mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
                audioChunks = [];
                recordedCents = [];

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                
                mediaRecorder.onstop = () => processRecording(midi, mimeType, stream);

                // Démarrage effectif après 500ms (le temps que le bip de référence passe)
                setTimeout(() => {
                    mediaRecorder.start();
                    isRecording = true;
                    activeRecordMidi = midi;
                    btn.innerHTML = "⏹ STOP";
                    btn.classList.add('active');
                    
                    // Lancement de l'analyse YIN en tâche de fond (toutes les 50ms)
                    const targetFreq = midiToFreq(midi);
                    yinInterval = setInterval(() => {
                        const buffer = new Float32Array(analyserNode.fftSize);
                        analyserNode.getFloatTimeDomainData(buffer);
                        const ac = autoCorrelate(buffer, audioCtx.sampleRate);
                        if (ac !== -1) {
                            // Calcul de l'écart en cents
                            const cents = 1200 * Math.log2(ac / targetFreq);
                            recordedCents.push(cents);
                        }
                    }, 50);

                }, 500);

            } catch(err) {
                console.error(err);
                alert("Erreur micro : " + err.message);
            }
        }

        function stopRecording(midi, btn) {
            clearInterval(yinInterval);
            mediaRecorder.stop();
            isRecording = false;
            activeRecordMidi = null;
            btn.innerHTML = "🔴 REC";
            btn.classList.remove('active');
            btn.textContent = "Calcul...";
        }

        async function processRecording(midi, mimeType, stream) {
            // Couper le micro
            stream.getTracks().forEach(track => track.stop());

            // Création du fichier audio final
            const audioBlob = new Blob(audioChunks, { type: mimeType });

            // Analyse de la justesse (Médiane des valeurs captées)
            let medianCents = 0;
            if (recordedCents.length > 0) {
                recordedCents.sort((a, b) => a - b);
                medianCents = recordedCents[Math.floor(recordedCents.length / 2)];
            } else {
                alert("Aucune note détectée pendant l'enregistrement !");
                buildStudioList(parseInt(noteMinSelect.value), parseInt(noteMaxSelect.value)); // Refresh UI
                return;
            }

            const tolerance = 30; // ±30 cents comme défini dans la spec
            const isGood = Math.abs(medianCents) <= tolerance;
            
            let saveConfirmed = true;
            if (!isGood) {
                // Demande à l'utilisateur s'il veut forcer la sauvegarde (car hors tolérance)
                saveConfirmed = confirm(`Justesse moyenne : ${medianCents > 0 ? '+' : ''}${Math.round(medianCents)} cents.\nC'est en dehors de la tolérance de ±30 cents.\nVoulez-vous l'accepter quand même ?`);
            }

            if (saveConfirmed) {
                await saveSampleToDB(midi, audioBlob, mimeType, Math.round(medianCents));
            }
            
            // Rafraîchissement de la liste
            buildStudioList(parseInt(noteMinSelect.value), parseInt(noteMaxSelect.value));
        }

        // ==========================================
        // UI DU STUDIO
        // ==========================================
        const noteMinSelect = document.getElementById('note-min');
        const noteMaxSelect = document.getElementById('note-max');
        const listContainer = document.getElementById('studio-recording-list');

        function initTessitureSelectors() {
            for (let i = 36; i <= 84; i++) {
                noteMinSelect.appendChild(new Option(`${midiToNoteName(i)} (MIDI: ${i})`, i));
                noteMaxSelect.appendChild(new Option(`${midiToNoteName(i)} (MIDI: ${i})`, i));
            }
            noteMinSelect.value = 40; 
            noteMaxSelect.value = 60; 
            updateTessitureSummary();
        }

        async function updateTessitureSummary() {
            const min = parseInt(noteMinSelect.value);
            const max = parseInt(noteMaxSelect.value);
            if (min >= max) { listContainer.innerHTML = ""; return; }
            document.getElementById('tessiture-summary').textContent = `Kit: ${max - min + 1} notes.`;
            buildStudioList(min, max);
        }

        async function buildStudioList(min, max) {
            const dbStatus = await checkExistingSamples();
            listContainer.innerHTML = "";
            
            for (let i = min; i <= max; i++) {
                const recordedData = dbStatus[i];
                const isRecorded = !!recordedData;
                
                const item = document.createElement('div');
                item.className = 'studio-item';
                
                const labelInfo = document.createElement('div');
                labelInfo.innerHTML = `<strong>${midiToNoteName(i)}</strong> <span style="font-size:0.8rem; color:#888;">(MIDI: ${i})</span>`;
                
                const actions = document.createElement('div');
                actions.style.display = "flex"; actions.style.gap = "8px"; actions.style.alignItems = "center";

                const badge = document.createElement('span');
                if (isRecorded) {
                    const cents = recordedData.cents_offset || 0;
                    const isPerfect = Math.abs(cents) <= 30;
                    badge.className = `status-badge ${isPerfect ? 'ok' : 'warn'}`;
                    badge.textContent = `✓ ${cents > 0 ? '+' : ''}${cents} c`;
                } else {
                    badge.className = 'status-badge'; badge.textContent = "Vide";
                }

                const btnRec = document.createElement('button');
                btnRec.className = 'btn-action btn-rec';
                btnRec.id = `btn-rec-${i}`;
                btnRec.innerHTML = isRecorded ? "🔄 RE-REC" : "🔴 REC";
                btnRec.onclick = () => toggleRecord(i);

                actions.appendChild(badge);
                actions.appendChild(btnRec);

                if (isRecorded) {
                    const btnPlay = document.createElement('button');
                    btnPlay.className = 'btn-action btn-play-sample';
                    btnPlay.innerHTML = "▶";
                    btnPlay.onclick = () => playSampleFromDB(i);
                    actions.appendChild(btnPlay);
                }

                item.appendChild(labelInfo);
                item.appendChild(actions);
                listContainer.appendChild(item);
            }
        }

        window.onload = async () => {
            initTessitureSelectors();
            noteMinSelect.addEventListener('change', updateTessitureSummary);
            noteMaxSelect.addEventListener('change', updateTessitureSummary);
            await initIndexedDB();
            updateTessitureSummary();
        };
    </script>
</body>
</html>
